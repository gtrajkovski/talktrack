<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TalkTrack Feature Graphic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1024px;
      height: 500px;
      overflow: hidden;
    }

    .container {
      width: 1024px;
      height: 500px;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px 80px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Subtle gradient overlay */
    .road {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(30, 58, 95, 0.3) 0%, transparent 100%);
    }

    .left {
      z-index: 1;
      max-width: 580px;
    }

    .tagline {
      font-size: 56px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 20px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .tagline span {
      color: #60a5fa;
    }

    .subtitle {
      font-size: 22px;
      color: rgba(255,255,255,0.8);
      font-weight: 400;
      margin-bottom: 30px;
    }

    .badges {
      display: flex;
      gap: 16px;
    }

    .badge {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 20px;
      border-radius: 30px;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      font-weight: 500;
    }

    .right {
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glowing orb - matches StateOrb from the app */
    .orb-container {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .orb {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #60a5fa 0%, #3b82f6 40%, #1d4ed8 100%);
      box-shadow:
        0 0 60px rgba(96, 165, 250, 0.6),
        0 0 120px rgba(59, 130, 246, 0.4),
        inset 0 -20px 40px rgba(0,0,0,0.2);
      animation: pulse 3s ease-in-out infinite;
    }

    .orb::after {
      content: '';
      position: absolute;
      top: 20%;
      left: 25%;
      width: 30%;
      height: 20%;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      filter: blur(10px);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }

    /* Sound waves */
    .waves {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .wave {
      position: absolute;
      border: 2px solid rgba(96, 165, 250, 0.3);
      border-radius: 50%;
      animation: wave 3s ease-out infinite;
    }

    .wave:nth-child(1) { width: 240px; height: 240px; top: -120px; left: -120px; animation-delay: 0s; }
    .wave:nth-child(2) { width: 300px; height: 300px; top: -150px; left: -150px; animation-delay: 0.5s; }
    .wave:nth-child(3) { width: 360px; height: 360px; top: -180px; left: -180px; animation-delay: 1s; }

    @keyframes wave {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    /* Logo */
    .logo {
      position: absolute;
      bottom: 30px;
      right: 40px;
      font-size: 20px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="road"></div>

    <div class="left">
      <div class="tagline">Rehearse<br><span>Hands-Free</span></div>
      <div class="subtitle">Practice presentations while you commute, jog, or do chores</div>
      <div class="badges">
        <div class="badge">100% Hands-Free</div>
        <div class="badge">35+ Voice Commands</div>
        <div class="badge">Works Offline</div>
      </div>
    </div>

    <div class="right">
      <div class="orb-container">
        <div class="waves">
          <div class="wave"></div>
          <div class="wave"></div>
          <div class="wave"></div>
        </div>
        <div class="orb"></div>
      </div>
    </div>

    <div class="logo">TALKTRACK</div>
  </div>
</body>
</html>
